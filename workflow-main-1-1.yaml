name: Vprofile CICD Workflow
on: 
  push:
    branches: 
      - main

  pull_request:
    branches: 
      - main

  workflow_dispatch:

  #schedule:
   # - cron: "10 14 * * 1-5"   # After noon 2:10 pm, Monday to Friday

env:
  ECR_REPOSITORY: 'vprofile-app-image'
  
permissions: 
  contents: read

jobs:
  Build:
    runs-on: ubuntu-latest
    steps:
      - name: Code checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Maven Build
        run: mvn install

      - name: Upload Build Artifact (WAR)
        uses: actions/upload-artifact@v4
        with:
          name: vprofile-app
          path: target/*.war


  Testing:
    runs-on: ubuntu-latest
    needs: Build
    steps:
      - name: Code checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run tests on main branch
        if: github.ref == 'refs/heads/main'
        run: mvn test

      - name: Checkstyle
        if: github.ref == 'refs/heads/main'
        run: mvn checkstyle:checkstyle

      - name: Run tests on other branches
        if: github.ref != 'refs/heads/main'
        run: echo "Skipping unit tests and code analysis"


  Security_Scan:
    runs-on: ubuntu-latest
    needs: Build
    steps:
      - name: Code checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          format: json
          exit-code: 0
          vuln-type: os,library
          output: trivy-results.json

      - name: Upload Trivy scan results as artifact
        uses: actions/upload-artifact@v4
        with:
          name: trivy-scan-results
          path: trivy-results.json


  BUILD_AND_PUBLISH:
    name: BUILD_AND_PUBLISH
    runs-on: ubuntu-latest
    environment: production
    needs: [Build, Testing, Security_Scan]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Code checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr 
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -f Docker-files/app/multistage/Dockerfile -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG


  Notify_On_Failure:
    name: Notify DevOps Agent on Failure
    runs-on: ubuntu-latest
    # Tüm job'lara bağlı - herhangi biri fail veya cancel olsa bile çalışır
    needs: [Build, Testing, Security_Scan, BUILD_AND_PUBLISH]
    if: always() && (needs.Build.result == 'failure' || needs.Testing.result == 'failure' || needs.Security_Scan.result == 'failure' || needs.BUILD_AND_PUBLISH.result == 'failure')
    steps:
      - name: Determine failed job
        id: failed_job
        run: |
          if [ "${{ needs.Build.result }}" = "failure" ]; then
            echo "name=Build" >> $GITHUB_OUTPUT
            echo "detail=Maven Build or WAR artifact upload failed." >> $GITHUB_OUTPUT
          elif [ "${{ needs.Testing.result }}" = "failure" ]; then
            echo "name=Testing" >> $GITHUB_OUTPUT
            echo "detail=Maven Test or Checkstyle step failed." >> $GITHUB_OUTPUT
          elif [ "${{ needs.Security_Scan.result }}" = "failure" ]; then
            echo "name=Security_Scan" >> $GITHUB_OUTPUT
            echo "detail=Trivy security scan or artifact upload failed." >> $GITHUB_OUTPUT
          else
            echo "name=BUILD_AND_PUBLISH" >> $GITHUB_OUTPUT
            echo "detail=Docker image build or ECR push failed." >> $GITHUB_OUTPUT
          fi

      - name: Trigger DevOps Agent Investigation
        env:
          DEVOPS_AGENT_WEBHOOK_URL: ${{ secrets.DEVOPS_AGENT_WEBHOOK_URL }}
          DEVOPS_AGENT_WEBHOOK_SECRET: ${{ secrets.DEVOPS_AGENT_WEBHOOK_SECRET }}
        run: |
          TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%S.000Z)
          INCIDENT_ID=$(cat /proc/sys/kernel/random/uuid)
          FAILED_JOB="${{ steps.failed_job.outputs.name }}"
          DETAIL="${{ steps.failed_job.outputs.detail }}"

          PAYLOAD=$(printf '{"eventType":"incident","incidentId":"%s","action":"created","priority":"HIGH","title":"[Vprofile CICD] %s job failed on %s","description":"%s Investigate the failure related to the latest commit and identify the root cause. Workflow:%s Job:%s Branch:%s Commit:%s TriggeredBy:%s Run URL:https://github.com/%s/actions/runs/%s 1. Review changes introduced in the latest commit 2. Analyze job logs 3. Identify root cause and suggest a fix","service":"vprofile","timestamp":"%s","data":{"metadata":{"repository":"%s","branch":"%s","commit":"%s","workflow":"%s","run_id":"%s","actor":"%s","failed_job":"%s"}}}' \
            "$INCIDENT_ID" \
            "$FAILED_JOB" \
            "${{ github.ref_name }}" \
            "$DETAIL" \
            "${{ github.workflow }}" \
            "$FAILED_JOB" \
            "${{ github.ref_name }}" \
            "${{ github.sha }}" \
            "${{ github.actor }}" \
            "${{ github.repository }}" \
            "${{ github.run_id }}" \
            "$TIMESTAMP" \
            "${{ github.repository }}" \
            "${{ github.ref_name }}" \
            "${{ github.sha }}" \
            "${{ github.workflow }}" \
            "${{ github.run_id }}" \
            "${{ github.actor }}" \
            "$FAILED_JOB")

          SIGNATURE=$(echo -n "${TIMESTAMP}:${PAYLOAD}" | openssl dgst -sha256 -hmac "$DEVOPS_AGENT_WEBHOOK_SECRET" -binary | base64 -w 0)

          HTTP_STATUS=$(curl -s -o /tmp/response.txt -w "%{http_code}" \
            -X POST "$DEVOPS_AGENT_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -H "x-amzn-event-timestamp: $TIMESTAMP" \
            -H "x-amzn-event-signature: $SIGNATURE" \
            -d "$PAYLOAD")

          echo "DevOps Agent → HTTP $HTTP_STATUS"
          cat /tmp/response.txt
          exit 0
